# The Card Bar — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: thecard-bar
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health/connectors
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BASIC_CARD
        sync: false
      - key: STRIPE_PRICE_METAL_CARD
        sync: false
      - key: STRIPE_PRICE_HOSTING
        sync: false
      - key: STRIPE_PRICE_AI_ADDON
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
